<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a1f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect x="40" y="40" width="432" height="432" rx="80" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <!-- AP2 text -->
  <text x="256" y="210" font-family="Arial Black,sans-serif" font-size="140" font-weight="900" fill="url(#accent)" text-anchor="middle">AP2</text>
  <!-- Trainer text -->
  <text x="256" y="310" font-family="Arial,sans-serif" font-size="60" font-weight="700" fill="#ffffff99" text-anchor="middle">TRAINER</text>
  <!-- Fire emoji area -->
  <text x="256" y="400" font-family="serif" font-size="70" text-anchor="middle">🔥</text>
</svg>